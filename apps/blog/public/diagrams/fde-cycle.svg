<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" font-family="Pretendard, 'Pretendard Variable', -apple-system, 'Apple SD Gothic Neo', sans-serif" role="img" aria-label="FDE의 일 여섯 단계 순환">
  <defs>
    <marker id="cGray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/></marker>
    <marker id="cCoral" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#e8837a"/></marker>
  </defs>

  <rect x="30" y="24" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="125" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">① 발견</text>
  <text x="125" y="70" text-anchor="middle" font-size="12" fill="#6b7280">고객의 진짜 문제 찾기</text>

  <rect x="245" y="24" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="340" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">② 범위</text>
  <text x="340" y="70" text-anchor="middle" font-size="12" fill="#6b7280">몇 주짜리 최소 버전으로</text>

  <rect x="460" y="24" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="555" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">③ 구축</text>
  <text x="555" y="70" text-anchor="middle" font-size="12" fill="#6b7280">빠르게 만들고 데모</text>

  <rect x="460" y="170" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="555" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">④ 배치</text>
  <text x="555" y="216" text-anchor="middle" font-size="12" fill="#6b7280">고객 환경 안에 설치</text>

  <rect x="245" y="170" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="340" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">⑤ 정착</text>
  <text x="340" y="216" text-anchor="middle" font-size="12" fill="#6b7280">실제로 쓰게 만들기</text>

  <rect x="30" y="170" width="190" height="62" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text x="125" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2328">⑥ 증명</text>
  <text x="125" y="216" text-anchor="middle" font-size="12" fill="#6b7280">성과를 숫자로</text>

  <line x1="220" y1="55" x2="240" y2="55" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#cGray)"/>
  <line x1="435" y1="55" x2="455" y2="55" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#cGray)"/>
  <line x1="555" y1="86" x2="555" y2="165" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#cGray)"/>
  <line x1="460" y1="201" x2="440" y2="201" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#cGray)"/>
  <line x1="245" y1="201" x2="225" y2="201" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#cGray)"/>

  <line x1="125" y1="170" x2="125" y2="91" stroke="#e8837a" stroke-width="1.8" marker-end="url(#cCoral)"/>
  <text x="138" y="124" font-size="12" font-weight="700" fill="#b4544a">배운 것이 제품으로,</text>
  <text x="138" y="141" font-size="12" font-weight="700" fill="#b4544a">그리고 다시 처음으로</text>
</svg>
