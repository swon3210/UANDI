<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" font-family="Pretendard, 'Pretendard Variable', -apple-system, 'Apple SD Gothic Neo', sans-serif" role="img" aria-label="계약 사인 전후, 세일즈 엔지니어와 FDE의 일 범위 비교">
  <defs>
    <marker id="tGray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/></marker>
  </defs>

  <text x="270" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">계약 사인</text>
  <line x1="270" y1="30" x2="270" y2="170" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="4 4"/>

  <text x="40" y="52" font-size="13" font-weight="700" fill="#374151">세일즈 엔지니어</text>
  <rect x="40" y="60" width="230" height="18" rx="9" fill="#e5e7eb"/>
  <text x="282" y="74" font-size="12" fill="#6b7280">여기서 끝</text>

  <text x="40" y="112" font-size="13" font-weight="700" fill="#b4544a">FDE</text>
  <text x="630" y="112" text-anchor="end" font-size="12" font-weight="700" fill="#b4544a">사인 이후가 시작</text>
  <rect x="200" y="120" width="430" height="18" rx="9" fill="#e8837a"/>
  <text x="320" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">배치</text>
  <text x="440" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">정착</text>
  <text x="560" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">성과 증명</text>

  <line x1="30" y1="170" x2="644" y2="170" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#tGray)"/>
  <text x="648" y="192" text-anchor="end" font-size="12" fill="#9ca3af">시간 →</text>
</svg>
