<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>OG 폴백 테스트 원문</title>
    <meta property="og:title" content="OG 폴백 이미지 글" />
    <!-- 상대경로 og:image — 크롤러가 pageUrl 기준으로 절대화한다(parseOgImage). -->
    <meta property="og:image" content="/test-fixtures/og-html.jpg" />
    <meta property="og:description" content="원문 설명" />
  </head>
  <body>
    <h1>OG 폴백 테스트 원문</h1>
    <p>E2E og:image 폴백 테스트용 고정 페이지.</p>
  </body>
</html>
