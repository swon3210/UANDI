<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 따뜻한 피치 → 코랄 대각선 그라데이션 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4B0A2"/>
      <stop offset="100%" stop-color="#DC7065"/>
    </linearGradient>
    <!-- 중앙 하트 뒤 부드러운 글로우 -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8F3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFF8F3" stop-opacity="0"/>
    </radialGradient>
    <!-- 하트 fill — 상단 약간 밝게로 부드러운 입체감 -->
    <linearGradient id="heartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFCF8"/>
      <stop offset="100%" stop-color="#FFF8F3"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- 좌측 데코 하트 (배경에 따뜻하게 녹아드는 느낌) -->
  <g transform="translate(40 90) scale(3.0)" opacity="0.15">
    <path d="M24 10C23.5 7 21 3.5 16.5 3.5C9 3.5 3.5 9 3.5 16C3.5 24 15 33 22 36.5Q24 38 26 36.5C33 33 44.5 24 44.5 16C44.5 9 39 3.5 31.5 3.5C27 3.5 24.5 7 24 10Z" fill="#FFF8F3"/>
  </g>
  <g transform="translate(160 290) scale(2.0)" opacity="0.13">
    <path d="M24 10C23.5 7 21 3.5 16.5 3.5C9 3.5 3.5 9 3.5 16C3.5 24 15 33 22 36.5Q24 38 26 36.5C33 33 44.5 24 44.5 16C44.5 9 39 3.5 31.5 3.5C27 3.5 24.5 7 24 10Z" fill="#FFF8F3"/>
  </g>
  <g transform="translate(280 60) scale(1.2)" opacity="0.12">
    <path d="M24 10C23.5 7 21 3.5 16.5 3.5C9 3.5 3.5 9 3.5 16C3.5 24 15 33 22 36.5Q24 38 26 36.5C33 33 44.5 24 44.5 16C44.5 9 39 3.5 31.5 3.5C27 3.5 24.5 7 24 10Z" fill="#FFF8F3"/>
  </g>

  <!-- 중앙 하트 뒤 글로우 -->
  <ellipse cx="500" cy="250" rx="280" ry="220" fill="url(#centerGlow)"/>

  <!-- 중앙: 하트 아이콘 (~200×200, 크림톤 + 부드러운 수직 그라데이션) -->
  <g transform="translate(400 150) scale(4.2)">
    <path d="M24 10C23.5 7 21 3.5 16.5 3.5C9 3.5 3.5 9 3.5 16C3.5 24 15 33 22 36.5Q24 38 26 36.5C33 33 44.5 24 44.5 16C44.5 9 39 3.5 31.5 3.5C27 3.5 24.5 7 24 10Z" fill="url(#heartFill)"/>
  </g>

  <!-- 우측: 워드마크 + 카피 -->
  <text x="630" y="240"
        font-family="Pretendard"
        font-weight="800"
        font-size="96"
        fill="#FFF8F3"
        letter-spacing="4">UANDI</text>

  <text x="630" y="300"
        font-family="Pretendard"
        font-weight="500"
        font-size="30"
        fill="#FFF8F3"
        opacity="0.96">둘이서 만드는 우리만의 일상</text>
</svg>