name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          # 빌드 시 필요한 Firebase 환경변수 (더미 값 — 빌드만 통과하면 됨)
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-build-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: uandi-test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: uandi-test.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000'

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Start Firebase Emulators
        run: pnpm emulators &
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Wait for emulators
        run: |
          echo "Waiting for Auth emulator (9099)..."
          for i in $(seq 1 30); do
            curl -s http://localhost:9099 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "Waiting for Firestore emulator (8080)..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8080 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "Waiting for Storage emulator (9199)..."
          for i in $(seq 1 30); do
            curl -s http://localhost:9199 > /dev/null 2>&1 && break
            sleep 1
          done
          echo "All emulators ready."

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
